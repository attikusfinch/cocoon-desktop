name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

env:
  GOCOON_REF: app-rework

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            triple: x86_64-pc-windows-msvc
            bundles: nsis,msi
          - os: macos-latest # arm64
            triple: aarch64-apple-darwin
            bundles: dmg
          - os: macos-13 # intel
            triple: x86_64-apple-darwin
            bundles: dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: desktop

      # The gocoon core lives in its own repo; the sidecar is built from it.
      - uses: actions/checkout@v4
        with:
          repository: attikusfinch/gocoon
          ref: ${{ env.GOCOON_REF }}
          path: gocoon

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: gocoon/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Test core
        working-directory: gocoon
        run: go test ./...

      - name: Build sidecar (windows)
        if: runner.os == 'Windows'
        working-directory: desktop
        shell: pwsh
        run: ./scripts/build-sidecar.ps1 -Triple ${{ matrix.triple }}

      - name: Build sidecar (macos)
        if: runner.os == 'macOS'
        working-directory: desktop
        run: bash scripts/build-sidecar.sh ${{ matrix.triple }}

      - name: Install frontend deps
        working-directory: desktop
        run: npm ci

      - name: Tauri build
        working-directory: desktop
        run: npm run tauri build -- --bundles ${{ matrix.bundles }}

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: cocoon-${{ matrix.triple }}
          if-no-files-found: error
          path: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/dmg/*.dmg

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: desktop
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.dmg
